<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Festival Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      /* Custom scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 0.5rem;
      }

      .day-cell {
        transition: all 0.2s ease;
        aspect-ratio: 1 / 1;
      }

      @media (min-width: 768px) {
        .day-cell {
          aspect-ratio: auto;
          min-height: 100px;
        }
      }

      .day-cell:hover {
        transform: translateY(-2px);
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      #modal-backdrop {
        backdrop-filter: blur(4px);
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-blue-700 text-white shadow-md sticky top-0 z-10">
      <div
        class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center"
      >
        <div class="flex items-center space-x-3">
          <i class="fa-solid fa-building text-2xl"></i>
          <h1 class="text-2xl font-bold tracking-tight">
            Office<span class="font-light">Calendar</span>
          </h1>
        </div>
        <button
          id="today-btn"
          class="bg-white/20 hover:bg-white/30 transition-colors px-4 py-2 rounded-full text-sm font-medium backdrop-blur-sm"
        >
          Today
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main
      class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full flex flex-col lg:flex-row gap-8"
    >
      <!-- Calendar Section -->
      <div
        class="lg:w-2/3 glass-panel rounded-2xl shadow-xl p-4 sm:p-6 border border-slate-100"
      >
        <!-- Calendar Controls -->
        <div class="flex items-center justify-between mb-6">
          <button
            id="prev-month"
            class="p-2 rounded-full hover:bg-blue-100 text-blue-700 transition-colors"
          >
            <i class="fa-solid fa-chevron-left text-xl"></i>
          </button>
          <h2
            id="current-month-year"
            class="text-2xl font-bold text-slate-800 text-center flex-grow"
          >
            Loading...
          </h2>
          <button
            id="next-month"
            class="p-2 rounded-full hover:bg-blue-100 text-blue-700 transition-colors"
          >
            <i class="fa-solid fa-chevron-right text-xl"></i>
          </button>
        </div>

        <!-- Weekdays Header -->
        <div class="calendar-grid mb-2">
          <div class="text-center font-semibold text-slate-500 text-sm py-2">
            Sun
          </div>
          <div class="text-center font-semibold text-slate-500 text-sm py-2">
            Mon
          </div>
          <div class="text-center font-semibold text-slate-500 text-sm py-2">
            Tue
          </div>
          <div class="text-center font-semibold text-slate-500 text-sm py-2">
            Wed
          </div>
          <div class="text-center font-semibold text-slate-500 text-sm py-2">
            Thu
          </div>
          <div class="text-center font-semibold text-slate-500 text-sm py-2">
            Fri
          </div>
          <div class="text-center font-semibold text-slate-500 text-sm py-2">
            Sat
          </div>
        </div>

        <!-- Calendar Days -->
        <div id="calendar-days" class="calendar-grid">
          <!-- Days will be generated by JS -->
        </div>
      </div>

      <!-- Sidebar Section (Upcoming Festivals & Notes Overview) -->
      <div class="lg:w-1/3 flex flex-col gap-6">
        <!-- Upcoming Festivals -->
        <div
          class="glass-panel rounded-2xl shadow-xl p-6 border border-slate-100 flex-grow"
        >
          <div
            class="flex items-center space-x-2 mb-4 border-b border-slate-100 pb-4"
          >
            <i class="fa-solid fa-calendar-check text-blue-600"></i>
            <h3 class="text-lg font-bold">Upcoming Events</h3>
          </div>
          <div
            id="upcoming-list"
            class="space-y-4 max-h-[400px] overflow-y-auto pr-2"
          >
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </main>

    <!-- Modal for Date Details & Notes -->
    <div
      id="day-modal"
      class="fixed inset-0 z-50 hidden flex items-center justify-center p-4"
    >
      <!-- Backdrop -->
      <div id="modal-backdrop" class="absolute inset-0 bg-slate-900/40"></div>

      <!-- Modal Content -->
      <div
        class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col animate-fade-in-up"
      >
        <!-- Header -->
        <div
          id="modal-header"
          class="px-6 py-4 bg-slate-100 flex justify-between items-center border-b border-slate-200"
        >
          <h3 id="modal-date-title" class="text-xl font-bold text-slate-800">
            Date
          </h3>
          <button
            id="close-modal"
            class="text-slate-400 hover:text-slate-600 transition-colors"
          >
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>
        </div>

        <div class="p-6 flex-grow flex flex-col gap-5">
          <!-- Festival Info -->
          <div
            id="modal-festival-info"
            class="hidden bg-blue-50 border border-blue-100 rounded-xl p-4"
          >
            <div class="flex items-start space-x-3">
              <i class="fa-solid fa-bookmark text-blue-600 mt-1"></i>
              <div>
                <h4
                  id="modal-festival-name"
                  class="font-bold text-blue-900 text-lg"
                >
                  Festival Name
                </h4>
                <p id="modal-festival-desc" class="text-sm text-blue-700 mt-1">
                  Description goes here.
                </p>
              </div>
            </div>
          </div>

          <!-- Notes Section -->
          <div class="flex flex-col flex-grow">
            <label
              for="day-note"
              class="block text-sm font-semibold text-slate-700 mb-2 flex items-center space-x-2"
            >
              <i class="fa-regular fa-note-sticky text-blue-500"></i>
              <span>My Notes</span>
            </label>
            <textarea
              id="day-note"
              rows="5"
              class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none transition-shadow"
              placeholder="Add your notes, tasks, or reminders for this day..."
            ></textarea>
          </div>
        </div>

        <!-- Footer -->
        <div
          class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end space-x-3"
        >
          <button
            id="clear-note-btn"
            class="px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors hidden"
          >
            Clear Note
          </button>
          <button
            id="save-note-btn"
            class="px-5 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md hover:shadow-lg transition-all"
          >
            Save Note
          </button>
        </div>
      </div>
    </div>

    <script>
      // --- Configuration ---
      const COUNTRY_CODE = "IN"; // Change to 'US', 'GB', etc. for other regions

      // --- State Management ---
      // Pre-load cultural festivals that aren't always in public holiday APIs
      let festivalDatabase = {
        "2026-01-01": {
          name: "New Year's Day",
          desc: "Global celebration of the new calendar year.",
        },
        "2026-01-14": {
          name: "Makar Sankranti / Pongal",
          desc: "Harvest festival dedicated to the Sun God.",
        },
        "2026-01-26": {
          name: "Republic Day",
          desc: "Commemorates the adoption of the Constitution of India.",
        },
        "2026-02-14": {
          name: "Vasant Panchami",
          desc: "Festival marking the preparation for the arrival of spring.",
        },
        "2026-02-17": {
          name: "Maha Shivaratri",
          desc: "Great Night of Shiva, a major Hindu festival.",
        },
        "2026-03-03": {
          name: "Holika Dahan",
          desc: "Eve of Holi, celebrating the victory of good over evil.",
        },
        "2026-03-04": {
          name: "Holi",
          desc: "The vibrant festival of colors, spring, and love.",
        },
        "2026-03-20": {
          name: "Ramadan Begins",
          desc: "Start of the holy month of fasting.",
        },
        "2026-03-22": {
          name: "Gudi Padwa / Ugadi",
          desc: "Traditional new year for Marathis, Kannadigas, and Telugus.",
        },
        "2026-03-30": {
          name: "Ram Navami",
          desc: "Celebrates the birth of Lord Rama.",
        },
        "2026-04-02": {
          name: "Mahavir Jayanti",
          desc: "Celebrates the birth of Lord Mahavira.",
        },
        "2026-04-03": {
          name: "Good Friday",
          desc: "Christian holiday commemorating the crucifixion of Jesus.",
        },
        "2026-04-14": {
          name: "Baisakhi / Ambedkar Jayanti",
          desc: "Harvest festival and birth anniversary of B. R. Ambedkar.",
        },
        "2026-04-18": {
          name: "Eid al-Fitr",
          desc: "Marks the end of Ramadan.",
        },
        "2026-08-15": {
          name: "Independence Day",
          desc: "Commemorates the independence of India in 1947.",
        },
        "2026-08-28": {
          name: "Raksha Bandhan",
          desc: "Celebrates the bond of love between brothers and sisters.",
        },
        "2026-09-04": {
          name: "Krishna Janmashtami",
          desc: "Celebrates the birth of Lord Krishna.",
        },
        "2026-09-14": {
          name: "Ganesh Chaturthi",
          desc: "Festival celebrating the birth of Lord Ganesha.",
        },
        "2026-10-02": {
          name: "Gandhi Jayanti",
          desc: "Birth anniversary of Mahatma Gandhi.",
        },
        "2026-10-18": {
          name: "Dussehra",
          desc: "Celebrates the victory of Lord Rama over the demon king Ravana.",
        },
        "2026-10-29": {
          name: "Dhanteras",
          desc: "First day that marks the festival of Diwali.",
        },
        "2026-11-08": {
          name: "Diwali",
          desc: "The grand festival of lights, symbolizing the victory of light over darkness.",
        },
        "2026-11-09": {
          name: "Govardhan Puja",
          desc: "Celebrates Lord Krishna defeating Indra.",
        },
        "2026-11-10": {
          name: "Bhai Dooj",
          desc: "Celebrates the unconditional love between siblings.",
        },
        "2026-11-24": {
          name: "Guru Nanak Jayanti",
          desc: "Celebrates the birth of the first Sikh Guru.",
        },
        "2026-12-25": {
          name: "Christmas",
          desc: "Celebrates the birth of Jesus Christ.",
        },
        "2027-03-22": { name: "Holi (2027)", desc: "Festival of colors." },
      };
      const fetchedYears = new Set();
      let currentDate = new Date();
      let selectedDateString = null; // YYYY-MM-DD format
      let userNotes = {};

      // --- IndexedDB Setup ---
      const dbName = "CalendarNotesDB";
      const storeName = "notes";
      let db;

      async function initDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(dbName, 1);
          request.onerror = () => reject("IndexedDB error");
          request.onsuccess = (event) => {
            db = event.target.result;
            resolve(db);
          };
          request.onupgradeneeded = (event) => {
            const database = event.target.result;
            if (!database.objectStoreNames.contains(storeName)) {
              database.createObjectStore(storeName, { keyPath: "date" });
            }
          };
        });
      }

      async function loadNotesFromDB() {
        return new Promise((resolve) => {
          const transaction = db.transaction([storeName], "readonly");
          const store = transaction.objectStore(storeName);
          const request = store.getAll();
          request.onsuccess = () => {
            const notes = {};
            request.result.forEach((item) => {
              notes[item.date] = item.text;
            });
            resolve(notes);
          };
        });
      }

      async function saveNoteToDB(date, text) {
        return new Promise((resolve) => {
          const transaction = db.transaction([storeName], "readwrite");
          transaction.objectStore(storeName).put({ date, text });
          transaction.oncomplete = () => resolve();
        });
      }

      async function deleteNoteFromDB(date) {
        return new Promise((resolve) => {
          const transaction = db.transaction([storeName], "readwrite");
          transaction.objectStore(storeName).delete(date);
          transaction.oncomplete = () => resolve();
        });
      }

      // --- API Integration ---
      async function fetchHolidays(year) {
        if (fetchedYears.has(year)) return;
        fetchedYears.add(year); // Optimistic lock to prevent duplicate calls
        try {
          // Using Nager.Date API (Free, No Auth Required)
          const response = await fetch(
            `https://date.nager.at/api/v3/PublicHolidays/${year}/${COUNTRY_CODE}`,
          );

          if (!response.ok) {
            console.warn(
              `Holidays for ${year} could not be fetched (Status: ${response.status}).`,
            );
            return;
          }

          // Safely parse the response to avoid "Unexpected end of JSON input" on empty bodies
          const text = await response.text();
          if (!text || text.trim() === "") {
            console.warn(`Empty response received for ${year}.`);
            return;
          }

          const data = JSON.parse(text);

          if (Array.isArray(data)) {
            data.forEach((holiday) => {
              // Only add if it doesn't already exist in our cultural festival database
              if (holiday.date && !festivalDatabase[holiday.date]) {
                festivalDatabase[holiday.date] = {
                  name: holiday.name,
                  desc:
                    holiday.localName !== holiday.name
                      ? `Local name: ${holiday.localName}`
                      : "Public Holiday",
                };
              }
            });
          }
          renderCalendar();
        } catch (error) {
          console.error(
            `Failed to fetch or parse holidays for ${year}:`,
            error,
          );
          // Intentionally keeping the year in fetchedYears to prevent continuous failing requests on retry
        }
      }

      async function handleDateChange() {
        const year = currentDate.getFullYear();
        await fetchHolidays(year);

        // Pre-fetch next year if we're near the end of the current year for upcoming events logic
        if (currentDate.getMonth() >= 9) {
          fetchHolidays(year + 1);
        }
        renderCalendar();
      }

      // --- DOM Elements ---
      const monthYearDisplay = document.getElementById("current-month-year");
      const calendarDays = document.getElementById("calendar-days");
      const upcomingList = document.getElementById("upcoming-list");

      // Modal Elements
      const modal = document.getElementById("day-modal");
      const modalBackdrop = document.getElementById("modal-backdrop");
      const closeModalBtn = document.getElementById("close-modal");
      const modalDateTitle = document.getElementById("modal-date-title");
      const modalFestivalInfo = document.getElementById("modal-festival-info");
      const modalFestivalName = document.getElementById("modal-festival-name");
      const modalFestivalDesc = document.getElementById("modal-festival-desc");
      const noteTextarea = document.getElementById("day-note");
      const saveNoteBtn = document.getElementById("save-note-btn");
      const clearNoteBtn = document.getElementById("clear-note-btn");

      // --- Core Functions ---

      // Format Date to YYYY-MM-DD safely
      function formatDateString(year, month, day) {
        const m = (month + 1).toString().padStart(2, "0");
        const d = day.toString().padStart(2, "0");
        return `${year}-${m}-${d}`;
      }

      function formatPrettyDate(dateString) {
        const options = {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        };
        const date = new Date(dateString + "T00:00:00"); // Prevent timezone shift
        return date.toLocaleDateString("en-US", options);
      }

      function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        // Set Header
        const monthNames = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];
        monthYearDisplay.textContent = `${monthNames[month]} ${year}`;

        // Clear previous days
        calendarDays.innerHTML = "";

        // Get first day of month and total days
        const firstDayIndex = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const today = new Date();
        const isCurrentMonth =
          today.getFullYear() === year && today.getMonth() === month;
        const todayDate = today.getDate();

        // Render empty slots for days before the 1st
        for (let i = 0; i < firstDayIndex; i++) {
          const emptyCell = document.createElement("div");
          emptyCell.className =
            "day-cell bg-slate-50/50 rounded-xl border border-slate-100/50 hidden sm:block";
          calendarDays.appendChild(emptyCell);
        }

        // Render actual days
        for (let i = 1; i <= daysInMonth; i++) {
          const dateStr = formatDateString(year, month, i);
          const isToday = isCurrentMonth && i === todayDate;
          const festival = festivalDatabase[dateStr];
          const hasNote =
            userNotes[dateStr] && userNotes[dateStr].trim() !== "";

          const dayCell = document.createElement("div");

          // Base Classes
          let classes =
            "day-cell cursor-pointer rounded-xl border p-1 sm:p-2 flex flex-col relative overflow-hidden bg-white ";

          if (isToday) {
            classes += "border-blue-500 shadow-sm ring-1 ring-blue-500 ";
          } else {
            classes += "border-slate-200 hover:border-blue-300 ";
          }

          if (festival) {
            classes += "bg-blue-50/50 ";
          }

          dayCell.className = classes;
          dayCell.onclick = () =>
            openModal(dateStr, i, monthNames[month], year, festival);

          // Top row: Date number and Note icon
          let innerHTML = `<div class="flex justify-between items-start">
                    <span class="text-sm sm:text-base font-medium ${isToday ? "bg-blue-600 text-white w-6 h-6 sm:w-8 sm:h-8 rounded-full flex items-center justify-center" : "text-slate-700 p-1"}">${i}</span>`;

          if (hasNote) {
            innerHTML += `<i class="fa-solid fa-note-sticky text-blue-400 text-xs sm:text-sm mt-1 sm:mt-2 mr-1"></i>`;
          }

          innerHTML += `</div>`;

          // Festival info (hidden on mobile, shown on tablet/desktop)
          if (festival) {
            innerHTML += `
                        <div class="mt-auto pt-1">
                            <div class="text-[10px] sm:text-xs font-semibold text-blue-700 truncate w-full px-1" title="${festival.name}">
                                <i class="fa-solid fa-circle text-[6px] sm:text-[8px] mr-1 align-middle"></i>${festival.name}
                            </div>
                        </div>
                    `;
          }

          dayCell.innerHTML = innerHTML;
          calendarDays.appendChild(dayCell);
        }

        updateUpcomingFestivals();
      }

      function updateUpcomingFestivals() {
        upcomingList.innerHTML = "";
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        // Filter and sort festivals from today onwards
        const upcoming = Object.entries(festivalDatabase)
          .map(([date, data]) => ({ date, ...data }))
          .filter((fest) => {
            const festDate = new Date(fest.date + "T00:00:00");
            return festDate >= today;
          })
          .sort((a, b) => new Date(a.date) - new Date(b.date))
          .slice(0, 5); // Get next 5

        if (upcoming.length === 0) {
          upcomingList.innerHTML =
            '<p class="text-slate-500 text-sm italic text-center py-4">No upcoming festivals found in the database.</p>';
          return;
        }

        upcoming.forEach((fest) => {
          const festDate = new Date(fest.date + "T00:00:00");
          const isSoon = (festDate - today) / (1000 * 60 * 60 * 24) <= 7; // Within 7 days

          const item = document.createElement("div");
          item.className =
            "group p-4 rounded-xl border border-slate-200 bg-white hover:border-blue-300 hover:shadow-md transition-all cursor-pointer";
          item.onclick = () => {
            // Navigate calendar to that month and open modal
            currentDate = new Date(
              festDate.getFullYear(),
              festDate.getMonth(),
              1,
            );
            renderCalendar();
            openModal(
              fest.date,
              festDate.getDate(),
              [
                "January",
                "February",
                "March",
                "April",
                "May",
                "June",
                "July",
                "August",
                "September",
                "October",
                "November",
                "December",
              ][festDate.getMonth()],
              festDate.getFullYear(),
              fest,
            );
          };

          item.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-bold text-slate-800 group-hover:text-blue-700 transition-colors">${fest.name}</h4>
                        ${isSoon ? '<span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">Soon</span>' : ""}
                    </div>
                    <div class="flex items-center text-sm text-slate-500 space-x-2">
                        <i class="fa-regular fa-calendar-days"></i>
                        <span>${festDate.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</span>
                    </div>
                    <p class="text-xs text-slate-500 mt-2 line-clamp-2">${fest.desc}</p>
                `;
          upcomingList.appendChild(item);
        });
      }

      // --- Modal Logic ---

      function openModal(dateStr, dayNum, monthName, year, festivalData) {
        selectedDateString = dateStr;

        // Set Title
        modalDateTitle.textContent = formatPrettyDate(dateStr);

        // Handle Festival Info visibility
        if (festivalData) {
          modalFestivalName.textContent = festivalData.name;
          modalFestivalDesc.textContent = festivalData.desc;
          modalFestivalInfo.classList.remove("hidden");
        } else {
          modalFestivalInfo.classList.add("hidden");
        }

        // Load Note if exists
        if (userNotes[dateStr]) {
          noteTextarea.value = userNotes[dateStr];
          clearNoteBtn.classList.remove("hidden");
        } else {
          noteTextarea.value = "";
          clearNoteBtn.classList.add("hidden");
        }

        // Show modal
        modal.classList.remove("hidden");
        document.body.style.overflow = "hidden"; // Prevent background scrolling

        // Focus textarea slightly delayed for animation
        setTimeout(() => noteTextarea.focus(), 100);
      }

      function closeModal() {
        modal.classList.add("hidden");
        document.body.style.overflow = "";
        selectedDateString = null;
      }

      async function saveNote() {
        if (!selectedDateString) return;

        const noteText = noteTextarea.value.trim();

        if (noteText) {
          userNotes[selectedDateString] = noteText;
          await saveNoteToDB(selectedDateString, noteText);
        } else {
          delete userNotes[selectedDateString];
          await deleteNoteFromDB(selectedDateString);
        }

        closeModal();
        renderCalendar();
      }

      async function clearNote() {
        if (!selectedDateString) return;
        delete userNotes[selectedDateString];
        await deleteNoteFromDB(selectedDateString);
        closeModal();
        renderCalendar();
      }

      // --- Event Listeners ---

      document
        .getElementById("prev-month")
        .addEventListener("click", async () => {
          currentDate.setMonth(currentDate.getMonth() - 1);
          await handleDateChange();
        });

      document
        .getElementById("next-month")
        .addEventListener("click", async () => {
          currentDate.setMonth(currentDate.getMonth() + 1);
          await handleDateChange();
        });

      document
        .getElementById("today-btn")
        .addEventListener("click", async () => {
          currentDate = new Date();
          await handleDateChange();
        });

      closeModalBtn.addEventListener("click", closeModal);
      modalBackdrop.addEventListener("click", closeModal);
      saveNoteBtn.addEventListener("click", saveNote);
      clearNoteBtn.addEventListener("click", clearNote);

      // Escape key to close modal
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !modal.classList.contains("hidden")) {
          closeModal();
        }
      });

      // --- Initialization ---
      async function initApp() {
        try {
          await initDB();
          userNotes = await loadNotesFromDB();
          await handleDateChange(); // Fetches holidays and renders
        } catch (error) {
          console.error("Initialization failed:", error);
          renderCalendar(); // Fallback render
        }
      }

      initApp();
    </script>
  </body>
</html>
